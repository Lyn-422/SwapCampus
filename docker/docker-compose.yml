version: "3.9"

services:
  # MySQL 8.0
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-SwapCampus123!}
      MYSQL_DATABASE: swapcampus
      MYSQL_USER: swapcampus
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-SwapCampus123!}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Channels WebSocket)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Django 后端
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    environment:
      DJANGO_ENV: prod
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-random-secret-key}
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1"
      DB_ENGINE: mysql
      DB_NAME: swapcampus
      DB_USER: swapcampus
      DB_PASSWORD: ${MYSQL_PASSWORD:-SwapCampus123!}
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: swapcampus
      USE_MINIO_STORAGE: "True"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  # Nginx + 前端
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"

volumes:
  mysql_data:
  redis_data:
  minio_data:
